services:
  hive-metastore:
    image: apache/hive:4.0.1
    environment:
      SERVICE_NAME: metastore
    ports:
      - "${HIVE_METASTORE_HOST_PORT:-9083}:9083"
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/9083) 2>/dev/null || exit 1'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  hive-server:
    image: apache/hive:4.0.1
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
      IS_RESUME: "true"
    ports:
      - "${HIVE_THRIFT_HOST_PORT:-10000}:10000"
      - "${HIVE_WEBUI_HOST_PORT:-10002}:10002"
    depends_on:
      hive-metastore:
        condition: service_healthy
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "beeline -u 'jdbc:hive2://localhost:10000/' -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  hive_warehouse:
