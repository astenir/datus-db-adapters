services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    environment:
      - CLICKHOUSE_USER=default_user
      - CLICKHOUSE_PASSWORD=default_test
      - CLICKHOUSE_DB=default_test
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default_user", "--password", "default_test", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  clickhouse_data:
