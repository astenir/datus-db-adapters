name: Adapter CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
  workflow_dispatch:

concurrency:
  group: adapter-ci-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve changed test base
        id: changed-base
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            merge_group)
              echo "ref=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ref=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run unit tests
        run: |
          if [ -n "${{ steps.changed-base.outputs.ref }}" ]; then
            ci/run-unit-tests.sh --changed "${{ steps.changed-base.outputs.ref }}"
          else
            ci/run-unit-tests.sh
          fi

  integration-tests:
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    needs:
      - unit-tests
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve changed test base
        id: changed-base
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            merge_group)
              echo "ref=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ref=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run impacted integration tests
        run: |
          if [ -n "${{ steps.changed-base.outputs.ref }}" ]; then
            ci/run-integration-tests.sh --changed "${{ steps.changed-base.outputs.ref }}"
          else
            ci/run-integration-tests.sh
          fi

      - name: Stop integration services
        if: always()
        run: ci/run-integration-tests.sh --cleanup-only
